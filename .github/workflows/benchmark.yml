name: benchmark

# Yukon GitHub Actions execution provider: this workflow IS the grader.
# Yukon builds a candidate ref (validated baseline + the submission's
# src/ordering/ only) and dispatches THIS workflow on it; the score artifact is
# the machine-readable channel it reads back. See docs/PUBLISH-TO-YUKON-PLAN.md.
#
# Dispatch-only by design: no `pull_request` trigger. Yukon (or an explicit
# maintainer click) is the only thing that may start paid runner minutes, and
# head-SHA correlation works regardless of what triggered the run. Adding a
# `pull_request` trigger would let fork/maintainer PRs start runs and would
# double-run every Yukon submission.
on:
  workflow_dispatch:

# The workflow needs no Yukon credentials: the dispatched ref already IS the
# payload, and Yukon posts the score table on the PR itself. Read-only repo
# access is all the grading run requires.
permissions:
  contents: read

# One run per ref; retried dispatches for the same attempt dedupe. Do NOT
# cancel in progress — a near-complete grading run should finish, not be killed
# by a re-dispatch.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dispatched ref
        uses: actions/checkout@v4 # checks out the dispatched ref by default

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable # honors the repo's rust-toolchain file

      # cargo-deny is REQUIRED for grading (the harness runs in RequireDeny mode):
      # the license/source gate is authoritative now that submissions may declare
      # crates. A missing cargo-deny is a hard failure, not a fallback.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      # Validate deps.toml, generate the trusted manifest, freeze the lockfile,
      # vendor the FULL transitive tree, and scan it for native/FFI escapes. This
      # is the ONLY step that uses the network (cargo vendor fetches from the
      # frozen crates.io snapshot); the build and the scored run are offline.
      - name: Prepare build (validate deps, vendor, scan tree)
        run: bash scripts/prepare-build.sh

      # Stable step name "Setup": a failure here maps to setup_failed. Build from
      # the vendored snapshot with no network and the frozen lockfile — nothing
      # outside vendor/ can enter, so no closed-source or foreign code can be
      # fetched at build time (docs/DECISION-crate-policy.md, Task 7). The build
      # runs in a network namespace too: a vendored `--offline` build needs no
      # network, and isolating it means a dependency's build.rs cannot phone home
      # or exfiltrate even during compilation (the eval corpus is fetched AFTER
      # this step, so it is not on disk here regardless).
      - name: Setup
        run: |
          set -euo pipefail
          sudo unshare -n -- bash -c 'ip link set lo up 2>/dev/null || true; exec cargo build --release --offline --locked'

      # Fetch today's hidden EVAL corpus to a temp path OUTSIDE the repo tree, so
      # the eval bytes never sit at a tracked path and can never be committed
      # (publish plan §1). When no eval bucket is configured (milestone 1, before
      # the bucket exists), this is a no-op and the run grades the committed
      # PUBLIC dev corpus — proving the self-grading loop end to end first.
      - name: Fetch eval corpus
        id: corpus
        env:
          EVAL_BUCKET_NAME: ${{ secrets.EVAL_BUCKET_NAME }}
          EVAL_BUCKET_ENDPOINT: ${{ secrets.EVAL_BUCKET_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.EVAL_BUCKET_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EVAL_BUCKET_SECRET }}
          AWS_DEFAULT_REGION: ${{ secrets.EVAL_BUCKET_REGION }}
        run: |
          if [ -z "${EVAL_BUCKET_NAME:-}" ]; then
            echo "No EVAL_BUCKET_NAME secret set; grading the committed public dev corpus."
            echo "corpus_file=" >> "$GITHUB_OUTPUT"
          else
            ./.github/scripts/fetch-eval-corpus.sh "$RUNNER_TEMP/eval.jsonl"
            echo "corpus_file=$RUNNER_TEMP/eval.jsonl" >> "$GITHUB_OUTPUT"
          fi

      # Stable step name "Benchmark": a failure here maps to benchmark_failed.
      # SSI_CORPUS_FILE is the harness's corpus-path seam; when the fetch step
      # produced no eval file the value is empty, which the seam treats as unset
      # and falls back to the dev corpus (default-preserving).
      #
      # NETWORK ISOLATION: the scored run executes in a fresh network namespace
      # (`unshare -n`, loopback only) so an untrusted submission's order() cannot
      # reach the internet — it cannot call a hosted model or exfiltrate the eval
      # corpus at runtime (docs/DECISION-crate-policy.md, Task 9). The corpus is
      # already on local disk by this point, so no network is needed to score.
      # Isolating only this process leaves the runner agent's control-plane
      # connection intact (unlike a global `iptables OUTPUT DROP`). `set -euo
      # pipefail` + the explicit `unshare` mean a failure to establish isolation
      # fails the step LOUDLY rather than silently scoring un-isolated.
      - name: Benchmark
        env:
          SSI_CORPUS_FILE: ${{ steps.corpus.outputs.corpus_file }}
        run: |
          set -euo pipefail
          sudo --preserve-env=SSI_CORPUS_FILE unshare -n -- bash -c '
            ip link set lo up 2>/dev/null || true
            # Best-effort sanity check (logged, non-gating): confirm egress is
            # actually blocked inside the namespace before the scored run.
            bash .github/scripts/assert-no-network.sh || true
            exec cargo run --release --offline --locked
          '

      # The score artifact is the channel Yukon reads. Upload even on failure so
      # a partial/zero score is visible rather than silently lost; the run still
      # concludes `failure` (the harness exits non-zero on any gate failure),
      # which is what Yukon keys its accept/reject decision on.
      - name: Upload score
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: score
          path: score.json
          if-no-files-found: ignore
